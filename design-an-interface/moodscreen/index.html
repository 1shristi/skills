<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoodScreen</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-app: #1f2326;
    --bg-sidebar: #282a2d;
    --bg-topbar: #3f4245;
    --bg-card: #282828;
    --bg-card-hover: #333;
    --bg-input: #1a1a1a;
    --accent: #e5a00d;
    --accent-hover: #f5b020;
    --text-primary: #ffffff;
    --text-secondary: #999999;
    --text-muted: #666666;
    --border: rgba(255,255,255,0.1);
    --font: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --sidebar-width: 240px;
    --topbar-height: 56px;
  }

  html { font-size: 16px; }
  body {
    background: var(--bg-app);
    color: var(--text-primary);
    font-family: var(--font);
    overflow-x: hidden;
    min-height: 100vh;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  /* ─── Top Navigation Bar ─── */
  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: var(--topbar-height);
    background: var(--bg-topbar);
    display: flex;
    align-items: center;
    padding: 0 20px;
    z-index: 100;
    gap: 16px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.3);
  }
  .topbar-back {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .topbar-back:hover { color: var(--text-primary); background: rgba(255,255,255,0.1); }
  .topbar-logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    margin-right: 8px;
  }
  .topbar-logo-icon {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #000;
  }
  .topbar-search {
    flex: 1;
    max-width: 360px;
    position: relative;
  }
  .topbar-search input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 7px 12px 7px 34px;
    font-family: var(--font);
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
  }
  .topbar-search input::placeholder { color: var(--text-muted); }
  .topbar-search input:focus { border-color: var(--accent); }
  .topbar-search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }
  .topbar-spacer { flex: 1; }
  .topbar-user {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg-sidebar);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    position: fixed;
    top: var(--topbar-height);
    left: 0;
    bottom: 0;
    width: var(--sidebar-width);
    background: var(--bg-sidebar);
    overflow-y: auto;
    z-index: 50;
    padding: 12px 0;
    border-right: 1px solid rgba(0,0,0,0.3);
  }
  .sidebar-section-label {
    padding: 16px 16px 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-left: 3px solid transparent;
  }
  .sidebar-item:hover {
    background: rgba(255,255,255,0.06);
    color: var(--text-primary);
  }
  .sidebar-item.active {
    color: var(--text-primary);
    border-left-color: var(--accent);
    background: rgba(229, 160, 13, 0.08);
  }
  .sidebar-icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 16px;
  }

  /* ─── Content Area ─── */
  .content {
    margin-left: var(--sidebar-width);
    margin-top: var(--topbar-height);
    min-height: calc(100vh - var(--topbar-height));
  }

  /* ─── Hero Banner ─── */
  .hero {
    position: relative;
    height: 460px;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 120px;
    opacity: 0.2;
  }
  .hero-gradient-left {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, rgba(31,35,38,0.95) 0%, rgba(31,35,38,0.6) 40%, transparent 70%);
  }
  .hero-gradient-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(to top, var(--bg-app) 0%, transparent 100%);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    padding: 0 40px 40px;
    max-width: 600px;
  }
  .hero-title {
    font-size: 42px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .hero-meta {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hero-meta-dot { color: var(--text-muted); }
  .hero-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 20px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .hero-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn-play {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 4px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-play:hover { background: var(--accent-hover); }
  .btn-secondary {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.15);
    color: var(--text-primary);
    border: none;
    border-radius: 4px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.25); }

  /* ─── Mood Selector (Home) ─── */
  .mood-selector {
    padding: 24px 40px 0;
    animation: fadeIn 0.4s ease both;
  }
  .feeling-prompt {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text-primary);
  }
  .feeling-input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    max-width: 500px;
  }
  .feeling-input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 14px;
    font-family: var(--font);
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
  }
  .feeling-input::placeholder { color: var(--text-muted); }
  .feeling-input:focus { border-color: var(--accent); }
  .feeling-go {
    padding: 9px 20px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 4px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .feeling-go:hover { background: var(--accent-hover); }
  .mood-history-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .mood-history-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-right: 4px;
  }
  .mood-history-pill {
    padding: 4px 12px;
    border-radius: 4px;
    background: rgba(255,255,255,0.08);
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .mood-history-pill:hover {
    background: rgba(255,255,255,0.14);
    color: var(--text-primary);
    border-color: var(--border);
  }

  /* ─── Mood Grid ─── */
  .mood-grid-section {
    padding: 0 40px 32px;
  }
  .hub-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .hub-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .hub-more {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: color 0.15s;
  }
  .hub-more:hover { color: var(--accent); }
  .mood-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }
  .mood-card {
    position: relative;
    border-radius: 6px;
    padding: 20px;
    cursor: pointer;
    overflow: hidden;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .mood-card:hover {
    transform: scale(1.03);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 5;
  }
  .mood-card-emoji { font-size: 28px; margin-bottom: 10px; }
  .mood-card-label {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .mood-card-desc {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
    line-height: 1.4;
  }

  /* ─── Hub Row (Horizontal Poster Lane) ─── */
  .hub-row-section {
    padding: 0 0 24px;
  }
  .hub-row-header {
    padding: 0 40px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .hub-row-title {
    font-size: 18px;
    font-weight: 700;
  }
  .hub-row-count {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
  }
  .hub-row-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 4px 40px 8px;
    scroll-behavior: smooth;
    scrollbar-width: none;
  }
  .hub-row-scroll::-webkit-scrollbar { display: none; }

  /* ─── Poster Card (Plex-style) ─── */
  .poster-card {
    flex-shrink: 0;
    width: 160px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    position: relative;
  }
  .poster-card:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 10;
  }
  .poster-img-wrap {
    position: relative;
    width: 160px;
    height: 240px;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
    background: var(--bg-card);
  }
  .poster-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 40px;
  }
  .poster-placeholder-title {
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    padding: 0 10px;
    line-height: 1.3;
    color: rgba(255,255,255,0.6);
  }
  /* Play overlay on hover */
  .poster-play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    background: rgba(0,0,0,0.3);
  }
  .poster-card:hover .poster-play-overlay { opacity: 1; }
  .poster-play-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 2px solid rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
  }
  /* Mood relevance badge */
  .poster-relevance {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.7);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
  }
  /* Mood angle tags on hover */
  .poster-angles {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 24px 8px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .poster-card:hover .poster-angles { opacity: 1; }
  .poster-angle-tag {
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.15);
    font-size: 10px;
    color: rgba(255,255,255,0.85);
  }
  /* Progress bar at bottom of poster */
  .poster-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(255,255,255,0.2);
  }
  .poster-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }
  .poster-title {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .poster-meta {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* ─── Explore View ─── */
  .explore-header {
    padding: 24px 40px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    animation: fadeIn 0.3s ease both;
  }
  .explore-emoji { font-size: 32px; }
  .explore-title-group {}
  .explore-title {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.1;
  }
  .explore-desc {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 400;
    margin-top: 2px;
  }

  /* Blend bar */
  .blend-bar {
    padding: 0 40px 16px;
    animation: fadeIn 0.3s ease 0.1s both;
  }
  .blend-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .blend-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .blend-chip {
    padding: 5px 14px;
    border-radius: 4px;
    background: rgba(255,255,255,0.08);
    border: 1px solid transparent;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font);
    font-weight: 500;
  }
  .blend-chip:hover {
    background: rgba(255,255,255,0.14);
    color: var(--text-primary);
  }
  .blend-chip.active {
    background: rgba(229, 160, 13, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Adjacent moods section */
  .adjacent-section {
    padding: 24px 40px;
    border-top: 1px solid var(--border);
    margin-top: 16px;
  }
  .adjacent-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .adjacent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }
  .adjacent-card {
    padding: 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .adjacent-card:hover {
    transform: scale(1.03);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .adjacent-emoji { font-size: 20px; margin-bottom: 6px; }
  .adjacent-label { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .adjacent-desc { font-size: 11px; color: rgba(255,255,255,0.5); }

  /* ─── Modal (Pre-Play Detail Page) ─── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .modal-content {
    background: var(--bg-app);
    border-radius: 8px;
    max-width: 720px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    animation: modalIn 0.25s ease both;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    position: relative;
  }
  .modal-hero {
    position: relative;
    height: 280px;
    overflow: hidden;
    border-radius: 8px 8px 0 0;
  }
  .modal-hero-bg {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    opacity: 0.3;
  }
  .modal-hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, rgba(31,35,38,0.9) 0%, rgba(31,35,38,0.5) 50%, transparent 100%);
  }
  .modal-hero-gradient-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(to top, var(--bg-app), transparent);
  }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    background: rgba(0,0,0,0.5);
    border: none;
    color: var(--text-primary);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    z-index: 2;
  }
  .modal-close:hover { background: rgba(0,0,0,0.7); }
  .modal-body {
    padding: 0 32px 32px;
    margin-top: -48px;
    position: relative;
    z-index: 1;
  }
  .modal-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.1;
  }
  .modal-meta {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-meta-badge {
    border: 1px solid var(--text-muted);
    padding: 1px 5px;
    border-radius: 2px;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .modal-mood-fit {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 4px;
    background: rgba(229, 160, 13, 0.12);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .modal-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 6px;
    margin-top: 20px;
  }
  .modal-synopsis {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .modal-angles {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .modal-angle-tag {
    padding: 4px 10px;
    border-radius: 4px;
    background: rgba(255,255,255,0.08);
    font-size: 12px;
    color: var(--text-secondary);
  }
  .modal-cast {
    font-size: 13px;
    color: var(--text-secondary);

    if (l.includes('cozy')||l.includes('warm')||l.includes('comfort')) return 'cozy';
    if (l.includes('thrill')||l.includes('fast')||l.includes('intense')) return 'adrenaline';
    if (l.includes('nostalg')||l.includes('childhood')||l.includes('old')) return 'nostalgic';
    if (l.includes('happy')||l.includes('laugh')||l.includes('fun')) return 'lighthearted';
    if (l.includes('dark')||l.includes('creepy')||l.includes('twist')) return 'dark';
    if (l.includes('slow')||l.includes('think')||l.includes('quiet')||l.includes('beautiful')) return 'contemplative';
    if (l.includes('love')||l.includes('romantic')||l.includes('heart')) return 'romantic';
    if (l.includes('adventure')||l.includes('epic')||l.includes('quest')) return 'adventurous';
    return null;
  };

  return (
    <React.Fragment>
      <div className="mood-selector">
        <div className="mood-history-row">
          <span className="mood-history-label">Recent moods</span>
          {MOOD_HISTORY.map(id => {
            const m = MOODS.find(x=>x.id===id);
            return m ? (
              <span className="mood-history-pill" key={id} onClick={()=>onMoodSelect(id)}>
                {m.emoji} {m.label}
              </span>
            ) : null;
          })}
        </div>
      </div>

      <div className="mood-grid-section">
        <div className="hub-title-row">
          <span className="hub-title">Browse by Mood</span>
          <span className="hub-more">All Moods ›</span>
        </div>
        <div className="mood-grid">
          {MOODS.map((mood,i) => (
            <div className="mood-card" key={mood.id}
              onClick={()=>onMoodSelect(mood.id)}
              style={{
                background:`linear-gradient(145deg, ${mood.gradient[0]}, ${mood.gradient[1]}, ${mood.gradient[2]})`,
                animation:`fadeIn 0.3s ease ${i*0.04}s both`,
              }}>
              <div className="mood-card-emoji">{mood.emoji}</div>
              <div className="mood-card-label">{mood.label}</div>
              <div className="mood-card-desc">{mood.description}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Featured rows on home */}
      <HubRow title="Continue Watching" onItemClick={onItemClick}
        items={Object.values(MEDIA).flat().filter(i=>i.progress>0&&i.progress<1).slice(0,8)} />
      <HubRow title="Recently Added" onItemClick={onItemClick}
        items={Object.values(MEDIA).flat().filter(i=>i.year>=2019).slice(0,8)} />
    </React.Fragment>
  );
}

function ExploreScreen({ moodId, onItemClick, onMoodSwitch }) {
  const mood = MOODS.find(m=>m.id===moodId);
  const items = MEDIA[moodId] || [];
  const [blendMood, setBlendMood] = useState(null);

  const blendItems = blendMood && MEDIA[blendMood] ? MEDIA[blendMood].slice(0,4) : [];
  const displayItems = blendMood
    ? [...items,...blendItems].sort((a,b)=>b.rel-a.rel)
    : items;
  const adjacentMoods = (mood?.adjacentMoods||[]).map(id=>MOODS.find(m=>m.id===id)).filter(Boolean);

  if (!mood) return null;

  return (
    <React.Fragment>
      <HeroBanner mood={mood} />

      <div className="explore-header">
        <span className="explore-emoji">{mood.emoji}</span>
        <div className="explore-title-group">
          <div className="explore-title">{mood.label}</div>
          <div className="explore-desc">{mood.description}</div>
        </div>
      </div>

      <BlendBar currentMood={moodId} onBlend={setBlendMood} active={blendMood} />

      <HubRow
        title={blendMood ? `${mood.label} × ${MOODS.find(m=>m.id===blendMood)?.label}` : `Best for ${mood.label}`}
        items={displayItems}
        count={`${displayItems.length} titles`}
        onItemClick={onItemClick}
      />

      {!blendMood && items.length > 3 && (
        <HubRow title="Deep Cuts" items={[...items].reverse().slice(0,4)} onItemClick={onItemClick} />
      )}

      <div className="adjacent-section">
        <div className="adjacent-title">You might also be feeling...</div>
        <div className="adjacent-grid">
          {adjacentMoods.map((am,i) => (
            <div className="adjacent-card" key={am.id}
              onClick={()=>onMoodSwitch(am.id)}
              style={{
                background:`linear-gradient(145deg, ${am.gradient[0]}, ${am.gradient[1]})`,
                animation:`fadeIn 0.3s ease ${i*0.06}s both`,
              }}>
              <div className="adjacent-emoji">{am.emoji}</div>
              <div className="adjacent-label">{am.label}</div>
              <div className="adjacent-desc">{am.description}</div>
            </div>
          ))}
        </div>
      </div>
    </React.Fragment>
  );
}

function MediaModal({ item, onClose }) {
  const [fitRating, setFitRating] = useState(0);
  const [added, setAdded] = useState(false);

  useEffect(() => {
    const h = e => { if (e.key==='Escape') onClose(); };
    window.addEventListener('keydown',h);
    return () => window.removeEventListener('keydown',h);
  }, [onClose]);

  if (!item) return null;

  return (
    <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-content">
        <div className="modal-hero">
          <div className="modal-hero-bg" style={{background:'linear-gradient(135deg, #1a1a2e, #0f3460, var(--bg-app))'}}>
            {item.emoji}
          </div>
          <div className="modal-hero-gradient" />
          <div className="modal-hero-gradient-bottom" />
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="modal-title">{item.title}</div>
          <div className="modal-meta">
            <span>{item.year}</span>
            <span>·</span>
            <span>{item.kind==='tv'?'TV Series':`${item.dur} min`}</span>
            <span className="modal-meta-badge">{item.kind==='tv'?'TV-MA':'PG-13'}</span>
          </div>
          <div className="modal-mood-fit">◈ {Math.round(item.rel*100)}% mood fit</div>

          <div className="modal-label">Why this fits</div>
          <div className="modal-angles">
            {item.angles.map((a,i) => <span className="modal-angle-tag" key={i}>{a}</span>)}
          </div>

          <div className="modal-label">Synopsis</div>
          <p className="modal-synopsis">{item.synopsis}</p>

          <div className="modal-label">Cast</div>
          <p className="modal-cast">{item.cast.join(' · ')}</p>

          <div className="modal-label">Watch on</div>
          <div className="modal-streaming">
            {item.streaming.map((s,i) => <button className="modal-stream-btn" key={i}>{s}</button>)}
          </div>

          <div className="modal-label">Did this match the mood?</div>
          <div className="fit-rating">
            {[1,2,3,4,5].map(n => (
              <button className={`fit-star ${fitRating>=n?'active':''}`} key={n} onClick={()=>setFitRating(n)}>
                {fitRating>=n?'★':'☆'}
              </button>
            ))}
          </div>

          <div className="modal-actions">
            <button className="btn-play" onClick={()=>setAdded(!added)}>
              {added?'✓ In Collection':'+ Add to Collection'}
            </button>
            <button className="btn-secondary">Mark as Watched</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('home');
  const [activeMood, setActiveMood] = useState(null);
  const [selectedItem, setSelectedItem] = useState(null);
  const [searchText, setSearchText] = useState('');

  const handleMoodSelect = useCallback(id => {
    if (id === null) {
      setScreen('home');
      setActiveMood(null);
    } else {
      setActiveMood(id);
      setScreen('explore');
      window.scrollTo({top:0,behavior:'smooth'});
    }
  }, []);

  const handleHome = useCallback(() => {
    setScreen('home');
    setActiveMood(null);
  }, []);

  return (
    <React.Fragment>
      <Topbar screen={screen} onHome={handleHome}
        searchValue={searchText} onSearch={setSearchText} />
      <Sidebar screen={screen} activeMood={activeMood} onMoodSelect={handleMoodSelect} />
      <div className="content">
        {screen==='home' && (
          <HomeScreen onMoodSelect={handleMoodSelect}
            onItemClick={setSelectedItem} searchText={searchText} />
        )}
        {screen==='explore' && activeMood && (
          <ExploreScreen moodId={activeMood}
            onItemClick={setSelectedItem} onMoodSwitch={handleMoodSelect} />
        )}
      </div>
      {selectedItem && <MediaModal item={selectedItem} onClose={()=>setSelectedItem(null)} />}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
